<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Халқаро Ислом цивилизацияси форуми меҳмонлари рўйхати">
    <title>Islom sivilizatsiyasi forumi mehmonlar ro'yxati</title>
    <link rel="apple-touch-icon" sizes="180x180" href="./icon/apple-touch-icon (2).png">
    <link rel="icon" type="image/png" sizes="32x32" href="./icon/favicon-32x32 (2).png">
    <link rel="icon" type="image/png" sizes="16x16" href="./icon/favicon-16x16 (2).png">
    <link rel="manifest" href="./site (2).webmanifest">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Space+Grotesk:wght@500&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #0f1115;
        }

        h3,
        .brand {
            font-family: 'Poppins', sans-serif;
        }

        .card {
            background: #171a21;
            border: 1px solid #262a33;
            border-radius: 14px;
            padding: 18px;
            color: #e6e8ec;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card h3 {
            font-size: 15px;
            font-weight: 700;
            line-height: 1.35;
            color: #ffffff;
        }

        .card p {
            font-size: 13px;
            line-height: 1.5;
            color: #b7bcc7;
            margin: 0;
        }

        .card p b {
            color: #8ab4ff;
            font-weight: 600;
        }

        .badge {
            display: inline-block;
            align-self: flex-start;
            background: #1f2937;
            color: #8ab4ff;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .04em;
            text-transform: uppercase;
            padding: 3px 10px;
            border-radius: 999px;
            margin-bottom: 4px;
        }
    </style>
</head>

<body>
    <!-- Loading Screen -->
    <div id="loader"
        class="loading fixed inset-0 z-[9999] flex items-center justify-center bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 transition-all duration-700">

        <!-- Background Blur -->
        <div class="absolute w-96 h-96 bg-blue-600/20 blur-[120px] rounded-full"></div>
        <div class="absolute w-80 h-80 bg-amber-400/10 blur-[100px] rounded-full"></div>

        <div class="relative flex flex-col items-center">

            <!-- Spinner -->
            <div class="relative w-24 h-24">

                <div class="absolute inset-0 rounded-full border-4 border-slate-700">
                </div>

                <div class="absolute inset-0 rounded-full border-4 border-transparent border-t-amber-400 animate-spin">
                </div>

                <div class="absolute inset-3 rounded-full bg-slate-900 flex items-center justify-center animate-pulse">

                    <img src="./icon/iccu-icon.png" alt="">

                </div>

            </div>

            <!-- Title -->
            <h1 class="mt-8 text-3xl md:text-4xl font-extrabold tracking-[10px] text-white uppercase">
                Islom
            </h1>

            <p class="text-slate-300 tracking-[6px] uppercase">
                Sivilizatsiyasi
            </p>

            <!-- Loading Text -->
            <div class="mt-6 flex items-center gap-2">

                <span class="text-slate-400">
                    Yuklanmoqda
                </span>

                <span class="flex gap-1">

                    <span class="w-2 h-2 rounded-full bg-amber-400 animate-bounce"></span>

                    <span class="w-2 h-2 rounded-full bg-amber-400 animate-bounce [animation-delay:150ms]"></span>

                    <span class="w-2 h-2 rounded-full bg-amber-400 animate-bounce [animation-delay:300ms]"></span>

                </span>

            </div>

        </div>

    </div>


    <main>
        <header class="p-6 sm:p-10">
            <p class="brand text-xs tracking-widest uppercase text-blue-400">Islom Sivilizatsiyasi Forumi</p>
            <h1 class="brand text-2xl sm:text-3xl font-extrabold text-white mt-1">Хорижлик меҳмонлар рўйхати</h1>
        </header>
        <section>
            <div class="cards grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 p-6">

            </div>
        </section>
    </main>

    <script src="./js/products.js"></script>
    <script src="./js/main.js"></script>
</body>

</html>
