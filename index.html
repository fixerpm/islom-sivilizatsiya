<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Халқаро Ислом цивилизацияси форуми меҳмонлари рўйхати">
    <title>Islom sivilizatsiyasi forumi mehmonlar ro'yxati</title>
    <link rel="icon" href="./icon/Oʻzbekiston_islom_sivilizatsiyasi_markazi_logosi.png">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Space+Grotesk:wght@500&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #0f1115;
        }

        h3,
        .brand {
            font-family: 'Poppins', sans-serif;
        }

        .card {
            background: #171a21;
            border: 1px solid #262a33;
            border-radius: 14px;
            padding: 18px;
            color: #e6e8ec;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card h3 {
            font-size: 15px;
            font-weight: 700;
            line-height: 1.35;
            color: #ffffff;
        }

        .card p {
            font-size: 13px;
            line-height: 1.5;
            color: #b7bcc7;
            margin: 0;
        }

        .card p b {
            color: #8ab4ff;
            font-weight: 600;
        }

        .badge {
            display: inline-block;
            align-self: flex-start;
            background: #1f2937;
            color: #8ab4ff;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .04em;
            text-transform: uppercase;
            padding: 3px 10px;
            border-radius: 999px;
            margin-bottom: 4px;
        }
    </style>
</head>

<body>

    <main>
        <header class="p-6 sm:p-10">
            <p class="brand text-xs tracking-widest uppercase text-blue-400">Islom Sivilizatsiyasi Forumi</p>
            <h1 class="brand text-2xl sm:text-3xl font-extrabold text-white mt-1">Хорижлик меҳмонлар рўйхати</h1>
        </header>
        <section>
            <div class="cards grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 p-6">

            </div>
        </section>
    </main>

    <script src="./js/products.js"></script>
    <script src="./js/main.js"></script>
</body>

</html>
